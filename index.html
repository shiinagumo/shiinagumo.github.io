        <h2>关于</h2>

        <p>
            国境の長いトンネルを抜けると雪国であった。夜の底が白くなった。信号所に汽車が止まった。

向側の座席から娘が立って来て、島村の前のガラス窓を落とした。雪の冷気が流れこんだ。娘は窓いっぱいに乗り出して、遠くへ呼ぶように、
「駅長さあん、駅長さあん。」

明りをさげてゆっくり雪を踏んで来た男は、襟巻で鼻の上まで包み、耳に帽子の毛皮を垂れていた。
もうそんな寒さかと島村は外を眺めると、鉄道の官舎らしいバラックが山裾に寒々と散らばっているだけで、雪の色はそこまで行かぬうちに闇に呑まれていた。--------雪国
